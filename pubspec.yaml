name: mobile
description: GPMS mobile app (rebuilt)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^16.0.0
  dio: ^5.9.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.3.0
  flutter_dotenv: ^6.0.0
  shared_preferences: ^2.5.3
  gpms_api:
    path: ../../packages/gpms_api
  fl_chart: ^1.1.1
  shimmer: ^3.0.0
