        name:
          example: H&M
          type: string
        country:
          example: Sweden
          type: string
      required:
      - name
      type: object
    UpdateBuyerDto:
      example:
        country: Sweden
        name: H&M
      properties:
        name:
          example: H&M
          type: string
        country:
          example: Sweden
          type: string
      type: object
    CreateCuttingBatchDto:
      example:
        batchNo: CB-001
        poItemId: 9a3a44d1-0b0a-4fe9-a6ad-66db595d9b82
      properties:
        poItemId:
          example: 9a3a44d1-0b0a-4fe9-a6ad-66db595d9b82
          type: string
        batchNo:
          example: CB-001
          type: string
